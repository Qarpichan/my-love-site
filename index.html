<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>우리의 이야기</title>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Nanum+Myeongjo:wght@400;700;800&family=Playfair+Display:ital,wght@1,900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
    }
 
    html, body {
    width: 100%;
    min-height: 100%;
    overflow-x: hidden;
    overflow-y: auto;
    font-family: 'Gowun Batang', serif;
    }
 
    /* 배경 */
    #bg {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #ffb3c6 0%, #ffd6a5 100%);
      z-index: 0;
    }
 
    /* 버튼 래퍼 - z-index 5 (메뉴보다 낮게) */
    #btn-wrap {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
    }
 
    #gift-btn {
      width: 220px;
      height: 90px;
      border: none;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 8px 32px rgba(255, 120, 150, 0.25), 0 2px 10px rgba(0,0,0,0.07);
      cursor: pointer;
      font-family: 'Nanum Myeongjo', serif;
      font-size: 1.15rem;
      font-weight: 800;
      color: #c0506a;
      letter-spacing: 0.05em;
      transition:
        width 1.1s cubic-bezier(0.7, 0, 0.3, 1),
        height 1.1s cubic-bezier(0.7, 0, 0.3, 1),
        border-radius 1.1s cubic-bezier(0.7, 0, 0.3, 1),
        color 0.2s ease;
    }
 
    #gift-btn.expand {
      width: 300vmax;
      height: 300vmax;
      border-radius: 0;
      color: transparent;
      pointer-events: none;
    }
 
    /* 메뉴 - z-index 10 (버튼 위, 패널은 visible 되기 전까지 pointer-events:none) */
    #menu {
      position: fixed;
      top: 48px;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      z-index: 10;
      pointer-events: none;
    }
 
    .panel {
      flex: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.4rem;
      cursor: pointer;
      transform: scaleX(0);
      transform-origin: left center;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
      position: relative;
      overflow: hidden;
      will-change: transform;
    backface-visibility: hidden;
    }
 
    /* 배경 이미지 전용 레이어 - 이걸 scale해서 잔상/공백 없이 확대 */
    .panel-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      transition: transform 0.6s ease;
      transform: scale(1);
      z-index: 0;
    }
    .panel:hover .panel-bg {
      transform: scale(1.08);
    }
 
    /* 색 필터 오버레이 */
    .panel-overlay {
      position: absolute;
      inset: 0;
      mix-blend-mode: multiply;
      opacity: 0.82;
      transition: opacity 0.5s ease;
      z-index: 1;
    }
    .panel:hover .panel-overlay {
      opacity: 0.6;
    }
 
    /* 빛 효과 */
    .panel::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        135deg,
        rgba(255,255,255,0) 0%,
        rgba(255,255,255,0.06) 50%,
        rgba(255,255,255,0) 100%
      );
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
      z-index: 2;
    }
    .panel:hover::after {
      opacity: 1;
    }
 
    .panel:nth-child(1) .panel-bg { background-image: url('photos/menu1.jpg'); }
    .panel:nth-child(1) .panel-overlay { background: #edadb5; }
 
    .panel:nth-child(2) .panel-bg { background-image: url('photos/menu2.jpg'); }
    .panel:nth-child(2) .panel-overlay { background: #f0c4a0; }
 
    .panel:nth-child(3) .panel-bg { background-image: url('photos/menu3.jpg'); }
    .panel:nth-child(3) .panel-overlay { background: #d4a8c7; }
 
    .panel:nth-child(4) .panel-bg { background-image: url('photos/menu4.jpg'); }
    .panel:nth-child(4) .panel-overlay { background: #e8b89a; }
 
    .panel + .panel {
      border-left: 1px solid rgba(255,255,255,0.3);
    }
 
    .panel.visible {
      transform: scaleX(1);
      pointer-events: all;
    }
 
    /* 메뉴 4개 위에 겹쳐지는 HYUNZI */
    #bg-text {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Playfair Display', serif;
      font-size: clamp(6rem, 18vw, 16rem);
      font-weight: 900;
      font-style: italic;
      mix-blend-mode: normal;
      color: rgba(255, 255, 255, 0.18);
      letter-spacing: 0.02em;
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
      z-index: 11;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    @media (max-width:700px){
  #bg-text{
    font-size:20vw;
  }
}
    #bg-text.visible {
      opacity: 1;
    }
 
    .panel-icon {
      font-size: 3rem;
      transition: transform 0.3s ease;
      position: relative;
      z-index: 1;
    }
    .panel:hover .panel-icon {
      transform: scale(1.15) translateY(-5px);
    }
 
    .panel-label {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: 0.07em;
      color: #fff;
      text-shadow: 0 1px 6px rgba(0,0,0,0.25);
      position: relative;
      z-index: 1;
    }
 
    .panel-sub {
      font-size: 0.82rem;
      color: rgba(255, 255, 255, 0.85);
      letter-spacing: 0.03em;
      text-shadow: 0 1px 4px rgba(0,0,0,0.2);
      position: relative;
      z-index: 1;
    }
 
    /* 장식 */
    .deco {
      position: fixed;
      font-size: 1.3rem;
      opacity: 0.3;
      pointer-events: none;
      z-index: 2;
      animation: float 4s ease-in-out infinite;
      transition: opacity 0.4s ease;
    }
    .deco:nth-child(1) { top: 12%; left: 8%;  animation-delay: 0s; }
    .deco:nth-child(2) { top: 70%; left: 5%;  animation-delay: 1s; }
    .deco:nth-child(3) { top: 20%; right: 9%; animation-delay: 0.5s; }
    .deco:nth-child(4) { top: 75%; right: 7%; animation-delay: 1.5s; }
    .deco:nth-child(5) { top: 45%; left: 15%; animation-delay: 2s; }
    .deco.hide { opacity: 0; }
 
    /* 상단 네비바 */
    #navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 48px;
      background: rgba(91, 95, 70, 0.88);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 100;
    }
 
    #nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 900;
      font-style: italic;
      color: #e8e4d0;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: opacity 0.2s ease;
      text-decoration: none;
    }
    #nav-logo:hover { opacity: 0.7; }
 
    #nav-login {
      font-family: 'Gowun Batang', serif;
      font-size: 0.85rem;
      color: #e8e4d0;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 999px;
      padding: 4px 16px;
      cursor: pointer;
      transition: background 0.2s ease;
      text-decoration: none;
    }
    #nav-login:hover { background: rgba(255,255,255,0.22); }
 
    /* 로그인 모달 */
    #modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    #modal-backdrop.show {
      opacity: 1;
      pointer-events: all;
    }
 
    #modal {
      background: #fff;
      border-radius: 20px;
      padding: 40px 36px 32px;
      width: 320px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      transform: translateY(20px);
      transition: transform 0.3s ease;
    }
    #modal-backdrop.show #modal {
      transform: translateY(0);
    }
 
    #modal h2 {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.6rem;
      color: #5b5f46;
      text-align: center;
      margin-bottom: 4px;
    }
 
    #modal input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      font-family: 'Gowun Batang', serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s ease;
    }
    #modal input:focus { border-color: #edadb5; }
 
    #modal-submit {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #edadb5, #f0c4a0);
      color: #fff;
      font-family: 'Nanum Myeongjo', serif;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: opacity 0.2s ease;
    }
    #modal-submit:hover { opacity: 0.85; }
 
    #modal-error {
      font-size: 0.8rem;
      color: #e05555;
      text-align: center;
      min-height: 16px;
    }
 
    #modal-close {
      position: absolute;
      top: 14px;
      right: 18px;
      font-size: 1.2rem;
      cursor: pointer;
      color: #aaa;
      background: none;
      border: none;
      line-height: 1;
    }
    #modal-close:hover { color: #555; }
 
    #modal {
      position: relative;
    }
 
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }
 
/* ── 모바일 완성 버전 ── */
@media (max-width:700px){

  html, body{
    overflow-x:hidden;
  }

  #menu{
    flex-direction: column;
    height:100vh;
  }

  .panel{
    height:calc(25vh - 12px);
    transform: scaleY(0);
    transform-origin: top center;
  }

  .panel.visible{
    transform: scaleY(1);
  }

  .panel-icon{
    font-size:1.6rem;
  }

  .panel-label{
    font-size:1.2rem;
  }

  .panel-sub{
    font-size:0.7rem;
  }

  .panel + .panel{
    border-left:none;
    border-top:1px solid rgba(255,255,255,0.3);
  }

}
  </style>
</head>
<body>
 
  <!-- 로그인 모달 -->
  <div id="modal-backdrop">
    <div id="modal">
      <button id="modal-close" onclick="closeModal()">✕</button>
      <h2>SPARK!</h2>
      <input type="email" id="login-email" placeholder="이메일" />
      <input type="password" id="login-pw" placeholder="비밀번호" />
      <div id="modal-error"></div>
      <button id="modal-submit" onclick="doLogin()">로그인</button>
    </div>
  </div>
 
  <!-- 상단 네비바 -->
  <nav id="navbar">
    <a id="nav-logo" onclick="resetPage()">SPARK!</a>
    <a id="nav-login" onclick="openModal()">로그인</a>
  </nav>
 
  <div id="bg"></div>
 
  <div class="deco">🌸</div>
  <div class="deco">💗</div>
  <div class="deco">🌷</div>
  <div class="deco">✨</div>
  <div class="deco">🍀</div>
 
  <div id="btn-wrap">
    <button id="gift-btn">내 선물을 받아줘!</button>
  </div>
 
  <div id="menu">
    <div class="panel">
      <div class="panel-bg"></div>
      <div class="panel-overlay"></div>
      <div class="panel-icon">💬</div>
      <div class="panel-label">채팅</div>
      <div class="panel-sub">우리의 대화</div>
    </div>
    <div class="panel">
      <div class="panel-bg"></div>
      <div class="panel-overlay"></div>
      <div class="panel-icon">📷</div>
      <div class="panel-label">사진</div>
      <div class="panel-sub">소중한 순간들</div>
    </div>
    <div class="panel">
      <div class="panel-bg"></div>
      <div class="panel-overlay"></div>
      <div class="panel-icon">🎁</div>
      <div class="panel-label">열어봐</div>
      <div class="panel-sub">너에게 건네는</div>
    </div>
    <div class="panel">
      <div class="panel-bg"></div>
      <div class="panel-overlay"></div>
      <div class="panel-icon">🎮</div>
      <div class="panel-label">게임</div>
      <div class="panel-sub">같이 놀자</div>
    </div>
  </div>
 
  <!-- 메뉴 4개 위에 겹쳐지는 HYUNZI -->
  <div id="bg-text">HYUNZI</div>
 
  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
 
    const firebaseConfig = {
      apiKey: "AIzaSyArbWtIOJWfS-sWlJ4DkeLnlafJhAy2zH0",
      authDomain: "forhyunzi.firebaseapp.com",
      projectId: "forhyunzi",
      storageBucket: "forhyunzi.firebasestorage.app",
      messagingSenderId: "638378869535",
      appId: "1:638378869535:web:b08fcd78e174061ba6662a"
    };
 
    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
 
    // 로그인 상태 감지 → 버튼 텍스트 변경
    onAuthStateChanged(auth, (user) => {
      const loginBtn = document.getElementById('nav-login');
      if (user) {
        loginBtn.textContent = '로그아웃';
        loginBtn.onclick = () => signOut(auth);
      } else {
        loginBtn.textContent = '로그인';
        loginBtn.onclick = openModal;
      }
    });
 
    // 로그인 실행
    window.doLogin = async () => {
      const email = document.getElementById('login-email').value.trim();
      const pw    = document.getElementById('login-pw').value;
      const errEl = document.getElementById('modal-error');
      errEl.textContent = '';
 
      try {
        await signInWithEmailAndPassword(auth, email, pw);
        closeModal();
      } catch (e) {
        errEl.textContent = '이메일 또는 비밀번호가 올바르지 않아요.';
      }
    };
 
    // 엔터키로 로그인
    document.getElementById('login-pw').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') window.doLogin();
    });
  </script>
 
  <script>
    const btn    = document.getElementById('gift-btn');
    const panels = document.querySelectorAll('.panel');
    const decos  = document.querySelectorAll('.deco');
    const bgText = document.getElementById('bg-text');
 
    const PANEL_URLS = ['chat.html', 'photos.html', 'letters.html', 'game.html'];
 
    btn.addEventListener('click', () => {
      decos.forEach(d => d.classList.add('hide'));
      btn.classList.add('expand');
 
      panels.forEach((panel, i) => {
        setTimeout(() => {
          panel.classList.add('visible');
        }, 1100 + i * 130);
      });
 
      setTimeout(() => {
        bgText.classList.add('visible');
      }, 1100 + 3 * 130 + 600);
    });
 
    // 패널 클릭 → 페이지 이동
    panels.forEach((panel, i) => {
      panel.addEventListener('click', () => {
        window.location.href = PANEL_URLS[i];
      });
    });
 
    function resetPage() {
      panels.forEach(p => p.classList.remove('visible'));
      bgText.classList.remove('visible');
      btn.classList.remove('expand');
      decos.forEach(d => d.classList.remove('hide'));
    }
 
    function openModal() {
      document.getElementById('modal-backdrop').classList.add('show');
      setTimeout(() => document.getElementById('login-email').focus(), 300);
    }
 
    function closeModal() {
      document.getElementById('modal-backdrop').classList.remove('show');
      document.getElementById('modal-error').textContent = '';
    }
 
    // 배경 클릭 시 모달 닫기
    document.getElementById('modal-backdrop').addEventListener('click', (e) => {
      if (e.target.id === 'modal-backdrop') closeModal();
    });
  </script>
</body>

</html>
