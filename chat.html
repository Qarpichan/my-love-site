<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>채팅 — SPARK!</title>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Nanum+Myeongjo:wght@400;700;800&family=Playfair+Display:ital,wght@1,900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --olive: rgba(91,95,70,0.88);
      --pink: #edadb5;
      --peach: #f0c4a0;
      --text-dark: #3a3028;
      --text-mid: #7a6a60;
      --text-light: #b0a090;
      --bg: #fdf6f0;
      --panel-bg: #fef0f3;
      --chat-bg: #fff;
      --border: rgba(237,173,181,0.3);
      --bubble-me: linear-gradient(135deg, #edadb5, #f0c4a0);
      --bubble-other: #fff;
      --bubble-other-border: rgba(237,173,181,0.3);
      --navbar-h: 48px;
    }
 
    /* 다크모드 변수 */
    body.dark {
      --bg: #1a1a1a;
      --panel-bg: #222;
      --chat-bg: #1e1e1e;
      --border: rgba(255,255,255,0.08);
      --text-dark: #eee;
      --text-mid: #aaa;
      --text-light: #666;
      --bubble-other: #2e2e2e;
      --bubble-other-border: rgba(255,255,255,0.08);
    }
 
    /* 다크모드 토글 스위치 */
    #dark-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }
    #dark-toggle span {
      font-size: .75rem;
      color: #e8e4d0;
      opacity: .7;
    }
    .toggle-track {
      width: 36px; height: 20px;
      background: rgba(255,255,255,0.2);
      border-radius: 999px;
      position: relative;
      transition: background .3s ease;
      flex-shrink: 0;
    }
    .toggle-track.on {
      background: #7dbb8a;
    }
    .toggle-thumb {
      position: absolute;
      top: 3px; left: 3px;
      width: 14px; height: 14px;
      background: #fff;
      border-radius: 50%;
      transition: transform .3s ease;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    .toggle-track.on .toggle-thumb {
      transform: translateX(16px);
    }
 
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
 
    html, body {
      width:100%; height:100%;
      font-family: 'Gowun Batang', serif;
      background: var(--bg);
      overflow: hidden;
      transition: background .3s ease;
    }
 
    /* ── 네비바 ── */
    #navbar {
      position: fixed;
      top:0; left:0; right:0;
      height: var(--navbar-h);
      background: var(--olive);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 100;
    }
    #nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem; font-weight:900; font-style:italic;
      color: #e8e4d0; letter-spacing:.05em;
      cursor:pointer; text-decoration:none;
    }
    #nav-logo:hover { opacity:.7; }
    #nav-user {
      font-size: .85rem;
      color: #e8e4d0;
      display: flex; align-items: center; gap: 8px;
    }
    #nav-user span {
      background: rgba(255,255,255,0.15);
      border-radius: 999px;
      padding: 3px 12px;
    }
 
    /* ── 메인 레이아웃 ── */
    #layout {
      position: fixed;
      top: var(--navbar-h); left:0; right:0; bottom:0;
      display: grid;
      grid-template-columns: 220px 1fr 220px;
      gap: 0;
    }
 
    /* ── 왼쪽 패널 ── */
    #left-panel {
      background: var(--panel-bg);
      border-right: 1px solid var(--border);
      padding: 32px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
      transition: background .3s, border-color .3s;
    }
    #left-panel h3 {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1rem;
      color: var(--pink);
      border-bottom: 1px solid rgba(237,173,181,0.4);
      padding-bottom: 8px;
    }
    .left-note {
      font-size: .82rem;
      color: var(--text-mid);
      line-height: 1.5;
      white-space: pre-wrap;
    }
 
    /* ── 채팅 영역 ── */
    #chat-area {
      display: flex;
      flex-direction: column;
      background: var(--chat-bg);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      transition: background .3s, border-color .3s;
    }
 
    #chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      transition: border-color .3s;
    }
    #chat-header .chat-title {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 1rem; font-weight:800;
      color: var(--text-dark);
    }
    #online-dots {
      display: flex; gap: 4px; margin-left: auto;
    }
    .online-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ccc;
      transition: background .3s;
    }
    .online-dot.active { background: #7dbb8a; }
    .online-dot-label {
      font-size: .7rem;
      color: var(--text-light);
    }
 
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: #edadb5; border-radius:4px; }
 
    /* 날짜 구분선 */
    .date-divider {
      text-align: center;
      font-size: .72rem;
      color: var(--text-light);
      margin: 12px 0 4px;
      position: relative;
    }
    .date-divider::before, .date-divider::after {
      content:'';
      position:absolute; top:50%;
      width: 30%; height:1px;
      background: rgba(237,173,181,0.3);
    }
    .date-divider::before { left:0; }
    .date-divider::after { right:0; }
 
    /* 메시지 버블 */
    .msg-wrap {
      display: flex;
      flex-direction: column;
      max-width: 68%;
      gap: 2px;
    }
    .msg-wrap.me { align-self: flex-end; align-items: flex-end; }
    .msg-wrap.other { align-self: flex-start; align-items: flex-start; }
 
    .msg-sender {
      font-size: .7rem;
      color: var(--text-light);
      padding: 0 6px;
    }
 
    .msg-bubble {
      padding: 9px 14px;
      border-radius: 18px;
      font-size: .9rem;
      line-height: 1.6;
      color: var(--text-dark);
      word-break: break-word;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .msg-wrap.me .msg-bubble {
      background: var(--bubble-me);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg-wrap.other .msg-bubble {
      background: var(--bubble-other);
      border: 1px solid var(--bubble-other-border);
      border-bottom-left-radius: 4px;
      color: var(--text-dark);
      transition: background .3s, border-color .3s;
    }
 
    .msg-time {
      font-size: .65rem;
      color: var(--text-light);
      padding: 0 6px;
    }
 
    /* 입력중 표시 */
    #typing-indicator {
      padding: 4px 16px 8px;
      font-size: .75rem;
      color: var(--pink);
      min-height: 24px;
      font-style: italic;
    }
 
    /* 입력창 */
    #input-area {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--chat-bg);
      transition: background .3s, border-color .3s;
    }
    #msg-input {
      flex:1;
      padding: 10px 16px;
      border: 1.5px solid var(--border);
      border-radius: 999px;
      font-family: 'Gowun Batang', serif;
      font-size: .9rem;
      outline: none;
      resize: none;
      max-height: 100px;
      overflow-y: auto;
      transition: border-color .2s, background .3s, color .3s;
      background: var(--bg);
      color: var(--text-dark);
    }
    #msg-input:focus { border-color: var(--pink); }
    #send-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: none;
      background: var(--bubble-me);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      display: flex; align-items:center; justify-content:center;
      flex-shrink: 0;
      transition: opacity .2s, transform .15s;
    }
    #send-btn:hover { opacity:.85; transform: scale(1.05); }
    #send-btn:disabled { opacity:.4; cursor:default; transform:none; }
 
    /* ── 오른쪽 패널 ── */
    #right-panel {
      background: var(--panel-bg);
      border-left: 1px solid var(--border);
      padding: 32px 20px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      overflow-y: auto;
      transition: background .3s, border-color .3s;
    }
 
    .insta-card {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .insta-card h3 {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1rem;
      color: var(--pink);
      border-bottom: 1px solid rgba(237,173,181,0.4);
      padding-bottom: 8px;
    }
    .insta-item {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      padding: 8px 10px;
      border-radius: 12px;
      transition: background .2s;
    }
    .insta-item:hover { background: rgba(237,173,181,0.15); }
    .insta-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex; align-items:center; justify-content:center;
      flex-shrink: 0;
      overflow: hidden;
    }
    .insta-info { display:flex; flex-direction:column; gap:1px; }
    .insta-nick {
      font-family: 'Nanum Myeongjo', serif;
      font-size: .88rem; font-weight:800;
      color: var(--text-dark);
    }
    .insta-id {
      font-size: .75rem;
      color: var(--text-light);
    }
 
    /* 하트 버튼 */
    #heart-btn {
      flex-shrink: 0;
      width: 36px; height: 36px;
      border-radius: 50%;
      border: none;
      background: transparent;
      font-size: 1.2rem;
      cursor: pointer;
      transition: transform .15s;
      display: flex; align-items:center; justify-content:center;
    }
    #heart-btn:hover { transform: scale(1.3); }
    #heart-btn:active { transform: scale(0.9); }
 
    /* 떠다니는 하트 */
    .floating-heart {
      position: fixed;
      pointer-events: none;
      font-size: 1.6rem;
      z-index: 9999;
      animation: floatUp 2.4s ease-out forwards;
    }
    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
      60%  { opacity: 1; transform: translateY(-220px) scale(1.15) rotate(12deg); }
      100% { opacity: 0; transform: translateY(-380px) scale(0.7) rotate(-8deg); }
    }
 
    /* 로그인 안내 */
    #login-notice {
      position: fixed;
      inset:0;
      background: rgba(253,246,240,0.95);
      display: flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap: 12px;
      z-index: 50;
      font-family: 'Nanum Myeongjo', serif;
      color: var(--text-mid);
      font-size: 1rem;
    }
    #login-notice p { font-size: .9rem; }
    #go-login-btn {
      margin-top: 8px;
      padding: 8px 28px;
      border: none; border-radius: 999px;
      background: var(--bubble-me);
      color: #fff;
      font-family: 'Nanum Myeongjo', serif;
      font-weight:800; font-size:.9rem;
      cursor:pointer;
    }
 
    /* ── 모바일 ── */
    @media(max-width:700px){
      #layout {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr;
      }
      #left-panel, #right-panel { display:none; }
      #chat-area { border:none; }
    }
  </style>
</head>

계정으로 창이 전환 될꺼야 📸</p>

    <div id="chat-area">

          </div>

  </div>
 
  <script>
    // 페이지 로드 시 localStorage로 먼저 빠르게 적용 (깜빡임 방지)
    if (localStorage.getItem('darkMode') === 'true') {
      document.body.classList.add('dark');
      document.getElementById('toggle-track').classList.add('on');
      document.getElementById('dark-label').textContent = '☀️';
    }
    document.getElementById('dark-toggle').addEventListener('click', () => {
      window._toggleDark && window._toggleDark();
    });
  </script>
 
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      getFirestore, collection, addDoc, query,
      orderBy, onSnapshot, serverTimestamp,
      doc, setDoc, deleteDoc, getDoc, limit
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
 
    const firebaseConfig = {
      apiKey: "AIzaSyArbWtIOJWfS-sWlJ4DkeLnlafJhAy2zH0",
      authDomain: "forhyunzi.firebaseapp.com",
      projectId: "forhyunzi",
      storageBucket: "forhyunzi.firebasestorage.app",
      messagingSenderId: "638378869535",
      appId: "1:638378869535:web:b08fcd78e174061ba6662a"
    };
 
    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);
 
    // 이메일 → 닉네임
    const NICKNAMES = {
      'aa57365537': '현지',
      'kt71275911': '주워니',
    };
    // 이메일 앞부분으로 매핑
    function getNickname(email) {
      if (!email) return '알 수 없음';
      const id = email.split('@')[0];
      return NICKNAMES[id] || email;
    }
 
    const DOT_MAP = { '현지': 'dot-hyunzi', '주워니': 'dot-juwoni' };
 
    let currentUser = null;
 
    // ── 다크모드 Firestore 저장/불러오기 ──
    async function applyDarkMode(isDark) {
      document.body.classList.toggle('dark', isDark);
      document.getElementById('toggle-track').classList.toggle('on', isDark);
      document.getElementById('dark-label').textContent = isDark ? '☀️' : '🌙';
      localStorage.setItem('darkMode', isDark);
    }
 
    async function saveDarkMode(isDark) {
      if (!currentUser) return;
      await setDoc(doc(db, 'userSettings', currentUser.uid), { darkMode: isDark }, { merge: true });
    }
 
    async function loadDarkMode() {
      if (!currentUser) return;
      const snap = await getDoc(doc(db, 'userSettings', currentUser.uid));
      if (snap.exists()) {
        const isDark = snap.data().darkMode ?? false;
        applyDarkMode(isDark);
      }
    }
 
    window._toggleDark = async () => {
      const isDark = !document.body.classList.contains('dark');
      applyDarkMode(isDark);
      await saveDarkMode(isDark);
    };
    let typingTimer = null;
    let renderedDates = new Set();
 
    const messagesEl    = document.getElementById('messages');
    const inputEl       = document.getElementById('msg-input');
    const sendBtn       = document.getElementById('send-btn');
    const heartBtn      = document.getElementById('heart-btn');
    const typingEl      = document.getElementById('typing-indicator');
    const loginNotice   = document.getElementById('login-notice');
    const navNickname   = document.getElementById('nav-nickname');
 
    // ── 하트 버튼 ──
    const HEARTS = ['🩷','💗','💖','💕','❤️','🌸'];
 
    function launchHearts(fromSelf) {
      // 내가 보낸 건 버튼 위치에서, 상대가 보낸 건 화면 하단 중앙에서
      let cx, cy;
      if (fromSelf) {
        const btn = heartBtn.getBoundingClientRect();
        cx = btn.left + btn.width / 2;
        cy = btn.top  + btn.height / 2;
      } else {
        cx = window.innerWidth / 2;
        cy = window.innerHeight - 80;
      }
      for (let i = 0; i < 7; i++) {
        setTimeout(() => {
          const el = document.createElement('span');
          el.className = 'floating-heart';
          el.textContent = HEARTS[Math.floor(Math.random() * HEARTS.length)];
          const spread = (Math.random() - 0.5) * 140;
          el.style.left = (cx + spread) + 'px';
          el.style.top  = cy + 'px';
          el.style.fontSize = (1.2 + Math.random() * 0.8) + 'rem';
          el.style.animationDuration = (2 + Math.random() * 1.2) + 's';
          document.body.appendChild(el);
          el.addEventListener('animationend', () => el.remove());
        }, i * 80);
      }
    }
 
    // 하트 버튼 클릭 → Firestore에 이벤트 저장
    heartBtn.addEventListener('click', async () => {
      if (!currentUser) return;
      launchHearts(true);
      await addDoc(collection(db, 'hearts'), {
        from: getNickname(currentUser.email),
        createdAt: serverTimestamp()
      });
    });
 
    // 상대방 하트 실시간 감지
    let lastHeartTime = Date.now();
    function initHeartListener() {
      const q = query(collection(db, 'hearts'), orderBy('createdAt', 'desc'), limit(1));
      onSnapshot(q, (snap) => {
        snap.docChanges().forEach(change => {
          if (change.type !== 'added' && change.type !== 'modified') return;
          const data = change.doc.data();
          if (!data.createdAt) return;
          const ts = data.createdAt.toMillis();
          if (data.from === getNickname(currentUser?.email)) return;
          if (ts > lastHeartTime) {
            lastHeartTime = ts;
            launchHearts(false);
          }
        });
      });
    }
 
    // ── 로그인 상태 감지 ──
    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user;
        const nick = getNickname(user.email);
        navNickname.textContent = nick + ' 으로 로그인 중';
        loginNotice.style.display = 'none';
        sendBtn.disabled = false;
        initChat();
        initHeartListener();
        setOnline(nick, true);
        loadDarkMode();
        window.addEventListener('beforeunload', () => setOnline(nick, false));
      } else {
        loginNotice.style.display = 'flex';
        sendBtn.disabled = true;
      }
    });
 
    // ── 온라인 상태 ──
    async function setOnline(nick, isOnline) {
      const ref = doc(db, 'presence', nick);
      if (isOnline) {
        await setDoc(ref, { online: true, nick });
      } else {
        await deleteDoc(ref);
      }
    }
 
    // 온라인 presence 실시간 감지
    onSnapshot(collection(db, 'presence'), (snap) => {
      // 모든 dot 끄기
      document.querySelectorAll('.online-dot').forEach(d => d.classList.remove('active'));
      snap.forEach(doc => {
        const { nick } = doc.data();
        const dotId = DOT_MAP[nick];
        if (dotId) document.getElementById(dotId)?.classList.add('active');
      });
    });
 
    // ── 채팅 초기화 ──
    function initChat() {
      const q = query(collection(db, 'messages'), orderBy('createdAt'));
      onSnapshot(q, (snap) => {
        snap.docChanges().forEach(change => {
          if (change.type === 'added') renderMessage(change.doc.data());
        });
        scrollToBottom();
      });
 
      // 입력중 감지
      onSnapshot(collection(db, 'typing'), (snap) => {
        const others = [];
        snap.forEach(d => {
          const nick = getNickname(currentUser?.email);
          if (d.id !== nick) others.push(d.id);
        });
        typingEl.textContent = others.length ? `${others.join(', ')} 입력 중...` : '';
      });
    }
 
    // ── 메시지 렌더 ──
    function renderMessage(data) {
      const { text, email, createdAt } = data;
      const nick = getNickname(email);
      const isMe = email === currentUser?.email;
 
      // 날짜 구분선
      if (createdAt) {
        const date = createdAt.toDate();
        const dateStr = date.toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
        if (!renderedDates.has(dateStr)) {
          renderedDates.add(dateStr);
          const div = document.createElement('div');
          div.className = 'date-divider';
          div.textContent = dateStr;
          messagesEl.appendChild(div);
        }
      }
 
      const wrap = document.createElement('div');
      wrap.className = `msg-wrap ${isMe ? 'me' : 'other'}`;
 
      if (!isMe) {
        const sender = document.createElement('div');
        sender.className = 'msg-sender';
        sender.textContent = nick;
        wrap.appendChild(sender);
      }
 
      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.textContent = text;
      wrap.appendChild(bubble);
 
      if (createdAt) {
        const time = document.createElement('div');
        time.className = 'msg-time';
        const d = createdAt.toDate();
        time.textContent = d.toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit' });
        wrap.appendChild(time);
      }
 
      messagesEl.appendChild(wrap);
    }
 
    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
 
    // ── 메시지 전송 ──
    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || !currentUser) return;
 
      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;
 
      await addDoc(collection(db, 'messages'), {
        text,
        email: currentUser.email,
        createdAt: serverTimestamp()
      });
 
      clearTyping();
      sendBtn.disabled = false;
      scrollToBottom();
    }
 
    // ── 입력중 표시 ──
    async function setTyping() {
      if (!currentUser) return;
      const nick = getNickname(currentUser.email);
      await setDoc(doc(db, 'typing', nick), { nick });
      clearTimeout(typingTimer);
      typingTimer = setTimeout(clearTyping, 2500);
    }
 
    async function clearTyping() {
      if (!currentUser) return;
      const nick = getNickname(currentUser.email);
      await deleteDoc(doc(db, 'typing', nick));
    }
 
    // ── 이벤트 ──
    sendBtn.addEventListener('click', sendMessage);
 
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
 
    inputEl.addEventListener('input', () => {
      // 자동 높이
      inputEl.style.height = 'auto';
      inputEl.style.height = inputEl.scrollHeight + 'px';
      // 입력중 표시
      setTyping();
    });
  </script>
</body>
</html>
